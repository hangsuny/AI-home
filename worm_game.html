<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지렁이 게임 HTML 버전</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #f4f7f1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .wrap {
      width: min(92vw, 560px);
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 20px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      color: #24321b;
    }
    .info {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pill {
      background: #eef5e7;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      color: #2b3d1d;
    }
    .lives .heart {
      display: inline-block;
      margin-left: 2px;
      font-size: 17px;
    }
    .lives .off {
      opacity: 0.25;
    }
    .board-wrap {
      position: relative;
    }
    canvas {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1 / 1;
      display: block;
      margin: 0 auto;
      background: #dcecc8;
      border-radius: 16px;
      border: 2px solid #b7d19b;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 16px;
    }
    .message {
      background: rgba(255,255,255,0.94);
      padding: 18px 20px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      line-height: 1.5;
      color: #334125;
    }
    .message strong {
      display: block;
      font-size: 22px;
      margin-bottom: 8px;
    }
    .controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      color: #fff;
      background: #5d8f2a;
    }
    button.secondary {
      background: #7a7a7a;
    }
    .mobile-controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 64px);
      justify-content: center;
      gap: 8px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .dir-btn {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 16px;
      background: #eef5e7;
      color: #36551a;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    .dir-spacer {
      width: 64px;
      height: 64px;
    }
    .help {
      margin-top: 12px;
      color: #4d4d4d;
      font-size: 14px;
      line-height: 1.6;
    }
    .flash {
      animation: hitflash 0.2s linear 2;
    }
    @keyframes hitflash {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.01); filter: brightness(1.15); }
      100% { transform: scale(1); filter: brightness(1); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>지렁이 게임 HTML 버전</h1>
      <div class="info">
        <div class="pill">점수: <span id="score">0</span></div>
        <div class="pill">최고 점수: <span id="best">0</span></div>
        <div class="pill lives">목숨: <span id="lives"></span></div>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="game" width="480" height="480"></canvas>
      <div class="overlay" id="overlay">
        <div class="message" id="messageBox">
          <strong>시작 준비!</strong>
          방향키, 버튼, 또는 스와이프로 시작하세요.
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn">새 게임</button>
      <button id="pauseBtn" class="secondary">일시정지</button>
    </div>

    <div class="mobile-controls" aria-label="모바일 방향키">
      <div class="dir-spacer"></div>
      <button class="dir-btn" data-dir="up" aria-label="위로">▲</button>
      <div class="dir-spacer"></div>
      <button class="dir-btn" data-dir="left" aria-label="왼쪽">◀</button>
      <button class="dir-btn" data-dir="down" aria-label="아래로">▼</button>
      <button class="dir-btn" data-dir="right" aria-label="오른쪽">▶</button>
    </div>

    <div class="help">
      조작: 키보드 방향키 / 모바일 버튼 / 스와이프<br />
      먹이 5개마다 장애물 5개 추가<br />
      충돌 시 목숨 1 감소, 길이 20% 감소, 랜덤 위치 재시작, 장애물 일부 제거<br />
      충돌 후 바로 움직이지 않고 입력 1번 후 재시작, 무적 시간 3초
    </div>
  </div>

  <script>
    (function () {
      var canvas = document.getElementById('game');
      var ctx = canvas.getContext('2d');
      var scoreEl = document.getElementById('score');
      var bestEl = document.getElementById('best');
      var livesEl = document.getElementById('lives');
      var overlay = document.getElementById('overlay');
      var messageBox = document.getElementById('messageBox');
      var startBtn = document.getElementById('startBtn');
      var pauseBtn = document.getElementById('pauseBtn');
      var dirButtons = document.querySelectorAll('.dir-btn');

      var gridSize = 24;
      var tileCount = canvas.width / gridSize;
      var maxLives = 3;
      var invincibleDuration = 3000;
      var speed = 240;

      var worm = [];
      var food = { x: 0, y: 0 };
      var obstacles = [];
      var dx = 1;
      var dy = 0;
      var score = 0;
      var bestScore = Number(localStorage.getItem('worm-best-score-html') || 0);
      var lives = maxLives;
      var foodsEaten = 0;
      var running = false;
      var paused = false;
      var waitingForInput = true;
      var invincibleUntil = 0;
      var hitEffect = null;
      var loopId = null;
      var touchStartX = 0;
      var touchStartY = 0;

      bestEl.textContent = String(bestScore);

      function renderLives() {
        var html = '';
        for (var i = 0; i < maxLives; i += 1) {
          html += '<span class="heart ' + (i < lives ? '' : 'off') + '">❤</span>';
        }
        livesEl.innerHTML = html;
      }

      function showMessage(title, text) {
        messageBox.innerHTML = '<strong>' + title + '</strong>' + text;
        overlay.style.display = 'flex';
      }

      function hideMessage() {
        overlay.style.display = 'none';
      }

      function sameCell(a, b) {
        return a.x === b.x && a.y === b.y;
      }

      function isBlocked(cell, wormCells, obstacleCells) {
        for (var i = 0; i < wormCells.length; i += 1) {
          if (sameCell(wormCells[i], cell)) return true;
        }
        for (var j = 0; j < obstacleCells.length; j += 1) {
          if (sameCell(obstacleCells[j], cell)) return true;
        }
        return false;
      }

      function randomFoodCell(wormCells, obstacleCells) {
        for (var guard = 0; guard < 2000; guard += 1) {
          var cell = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
          if (!isBlocked(cell, wormCells, obstacleCells)) return cell;
        }
        return { x: 0, y: 0 };
      }

      function addRandomObstacles(count) {
        var added = 0;
        var guard = 0;
        while (added < count && guard < 3000) {
          guard += 1;
          var cell = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
          if (!isBlocked(cell, worm, obstacles) && !sameCell(cell, food)) {
            obstacles.push(cell);
            added += 1;
          }
        }
      }

      function randomRespawn(length) {
        var dirs = [
          { dx: 1, dy: 0 },
          { dx: -1, dy: 0 },
          { dx: 0, dy: 1 },
          { dx: 0, dy: -1 }
        ];

        for (var guard = 0; guard < 3000; guard += 1) {
          var dir = dirs[Math.floor(Math.random() * dirs.length)];
          var start = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
          var nextWorm = [];
          var valid = true;

          for (var i = 0; i < length; i += 1) {
            var cell = {
              x: start.x - dir.dx * i,
              y: start.y - dir.dy * i
            };
            if (
              cell.x < 0 || cell.x >= tileCount ||
              cell.y < 0 || cell.y >= tileCount ||
              isBlocked(cell, [], obstacles)
            ) {
              valid = false;
              break;
            }
            nextWorm.push(cell);
          }

          if (valid) {
            worm = nextWorm;
            dx = dir.dx;
            dy = dir.dy;
            return;
          }
        }

        worm = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 }
        ];
        dx = 1;
        dy = 0;
      }

      function resetRound(length, randomSpawn) {
        var targetLength = Math.max(3, length || 3);
        if (!randomSpawn) {
          worm = [];
          for (var i = 0; i < targetLength; i += 1) {
            worm.push({ x: 10 - i, y: 10 });
          }
          dx = 1;
          dy = 0;
        } else {
          randomRespawn(targetLength);
        }
        food = randomFoodCell(worm, obstacles);
      }

      function resetState() {
        score = 0;
        lives = maxLives;
        foodsEaten = 0;
        obstacles = [];
        invincibleUntil = 0;
        hitEffect = null;
        scoreEl.textContent = String(score);
        renderLives();
      }

      function resetGame() {
        if (loopId) {
          clearTimeout(loopId);
          loopId = null;
        }
        resetState();
        resetRound(3, false);
        running = false;
        paused = false;
        waitingForInput = true;
        pauseBtn.textContent = '일시정지';
        showMessage('시작 준비!', '방향키, 버튼, 또는 스와이프로 시작하세요.');
        draw();
      }

      function startLoop() {
        if (loopId) clearTimeout(loopId);
        loopId = setTimeout(function () {
          update();
          draw();
          if (running && !paused && !waitingForInput) {
            startLoop();
          }
        }, speed);
      }

      function startOrResume() {
        if (waitingForInput) {
          waitingForInput = false;
          running = true;
          paused = false;
          hideMessage();
          startLoop();
          return;
        }
        if (!running) {
          running = true;
          paused = false;
          hideMessage();
          startLoop();
        }
      }

      function setDirection(dir) {
        if (dir === 'up') {
          if (dy === 1 && running && !waitingForInput) return;
          dx = 0; dy = -1;
        } else if (dir === 'down') {
          if (dy === -1 && running && !waitingForInput) return;
          dx = 0; dy = 1;
        } else if (dir === 'left') {
          if (dx === 1 && running && !waitingForInput) return;
          dx = -1; dy = 0;
        } else if (dir === 'right') {
          if (dx === -1 && running && !waitingForInput) return;
          dx = 1; dy = 0;
        }
        if (waitingForInput) startOrResume();
      }

      function triggerHitEffect(cell) {
        hitEffect = { x: cell.x, y: cell.y, start: Date.now() };
        canvas.classList.remove('flash');
        void canvas.offsetWidth;
        canvas.classList.add('flash');
        setTimeout(function () {
          canvas.classList.remove('flash');
        }, 350);
      }

      function loseLife(head) {
        triggerHitEffect(head);
        lives -= 1;
        renderLives();

        if (lives <= 0) {
          var finalScore = score;
          resetGame();
          showMessage('게임 오버', '최종 점수: ' + finalScore + '<br>방향키, 버튼, 또는 스와이프로 다시 시작하세요.');
          return;
        }

        var reducedLength = Math.max(3, Math.ceil(worm.length * 0.8));
        invincibleUntil = Date.now() + invincibleDuration;

        if (obstacles.length > 0) {
          var removeCount = Math.max(1, Math.floor(obstacles.length * 0.5));
          obstacles.sort(function () { return Math.random() - 0.5; });
          obstacles.splice(0, removeCount);
        }

        resetRound(reducedLength, true);
        running = false;
        paused = false;
        waitingForInput = true;
        showMessage('앗!', '목숨이 1개 줄었습니다.<br>남은 목숨: ' + lives + '<br>입력 후 다시 시작합니다. 무적 3초 적용.');
      }

      function update() {
        if (!running || paused || waitingForInput) return;

        var head = { x: worm[0].x + dx, y: worm[0].y + dy };
        var invincible = Date.now() < invincibleUntil;
        var collided = false;

        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
          collided = true;
        }

        for (var i = 0; i < worm.length && !collided; i += 1) {
          if (sameCell(worm[i], head)) collided = true;
        }

        for (var j = 0; j < obstacles.length && !collided; j += 1) {
          if (sameCell(obstacles[j], head)) collided = true;
        }

        if (collided) {
          if (!invincible) loseLife(head);
          return;
        }

        worm.unshift(head);

        if (sameCell(head, food)) {
          score += 10;
          foodsEaten += 1;
          scoreEl.textContent = String(score);
          if (score > bestScore) {
            bestScore = score;
            bestEl.textContent = String(bestScore);
            localStorage.setItem('worm-best-score-html', String(bestScore));
          }
          if (foodsEaten % 5 === 0) addRandomObstacles(5);
          food = randomFoodCell(worm, obstacles);
        } else {
          worm.pop();
        }
      }

      function roundRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function drawTile(cell, color, radius) {
        var px = cell.x * gridSize;
        var py = cell.y * gridSize;
        ctx.fillStyle = color;
        roundRect(px + 2, py + 2, gridSize - 4, gridSize - 4, radius);
        ctx.fill();
      }

      function drawHitEffect() {
        if (!hitEffect) return;
        var elapsed = Date.now() - hitEffect.start;
        if (elapsed > 500) {
          hitEffect = null;
          return;
        }
        var alpha = 1 - elapsed / 500;
        var radius = 10 + elapsed / 12;
        var cx = hitEffect.x * gridSize + gridSize / 2;
        var cy = hitEffect.y * gridSize + gridSize / 2;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#ff5a5a';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var invincible = Date.now() < invincibleUntil;

        for (var y = 0; y < tileCount; y += 1) {
          for (var x = 0; x < tileCount; x += 1) {
            ctx.fillStyle = (x + y) % 2 === 0 ? '#dcecc8' : '#d4e5c0';
            ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
          }
        }

        drawTile(food, '#d94b4b', 10);

        for (var i = 0; i < obstacles.length; i += 1) {
          drawTile(obstacles[i], '#6f7682', 5);
        }

        for (var j = 0; j < worm.length; j += 1) {
          var color = j === 0 ? '#6a9f30' : '#7fb53d';
          if (invincible) color = j === 0 ? '#8bb7ff' : '#b7d0ff';
          drawTile(worm[j], color, 8);
        }

        if (worm.length > 0) {
          var eyeX = worm[0].x * gridSize;
          var eyeY = worm[0].y * gridSize;
          ctx.fillStyle = '#1f2a10';
          ctx.beginPath();
          ctx.arc(eyeX + 8, eyeY + 9, 2, 0, Math.PI * 2);
          ctx.arc(eyeX + 16, eyeY + 9, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        if (invincible) {
          ctx.save();
          ctx.globalAlpha = 0.12;
          ctx.fillStyle = '#78a8ff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.restore();
        }

        drawHitEffect();
      }

      document.addEventListener('keydown', function (e) {
        var key = e.key;
        if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
          e.preventDefault();
        }
        if (key === 'ArrowUp') setDirection('up');
        else if (key === 'ArrowDown') setDirection('down');
        else if (key === 'ArrowLeft') setDirection('left');
        else if (key === 'ArrowRight') setDirection('right');
      });

      for (var b = 0; b < dirButtons.length; b += 1) {
        (function (button) {
          var dir = button.getAttribute('data-dir');
          function handler(e) {
            e.preventDefault();
            setDirection(dir);
          }
          button.addEventListener('click', handler);
          button.addEventListener('touchstart', handler, { passive: false });
        })(dirButtons[b]);
      }

      canvas.addEventListener('touchstart', function (e) {
        var t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
      }, { passive: true });

      canvas.addEventListener('touchend', function (e) {
        var t = e.changedTouches[0];
        var sx = t.clientX - touchStartX;
        var sy = t.clientY - touchStartY;
        var ax = Math.abs(sx);
        var ay = Math.abs(sy);
        if (Math.max(ax, ay) < 20) return;
        if (ax > ay) setDirection(sx > 0 ? 'right' : 'left');
        else setDirection(sy > 0 ? 'down' : 'up');
      }, { passive: true });

      startBtn.addEventListener('click', resetGame);
      pauseBtn.addEventListener('click', function () {
        if (waitingForInput) return;
        paused = !paused;
        pauseBtn.textContent = paused ? '계속하기' : '일시정지';
        if (paused) {
          showMessage('일시정지', '계속하기 버튼을 누르면 다시 시작됩니다.');
        } else {
          hideMessage();
          startLoop();
        }
      });

      resetGame();
    })();
  </script>
</body>
</html>
