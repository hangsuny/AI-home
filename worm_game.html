<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지렁이 게임</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .wrap {
      width: min(92vw, 560px);
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      padding: 20px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 24px;
      margin: 0;
    }
    .info {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      background: #eef5e7;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
    }
    .lives {
      display: inline-flex;
      gap: 4px;
      vertical-align: middle;
      margin-left: 4px;
    }
    .heart {
      font-size: 18px;
      line-height: 1;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .heart.off {
      opacity: 0.25;
      transform: scale(0.9);
    }
    .board-wrap {
      position: relative;
    }
    canvas {
      width: 100%;
      height: auto;
      background: #dcecc8;
      border-radius: 16px;
      border: 2px solid #b7d19b;
      display: block;
      touch-action: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .message {
      background: rgba(255,255,255,0.92);
      padding: 18px 20px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      line-height: 1.5;
    }
    .message strong {
      font-size: 22px;
      display: block;
      margin-bottom: 8px;
    }
    .controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      background: #5d8f2a;
      color: white;
    }
    button.secondary {
      background: #7a7a7a;
    }
    .mobile-controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 64px);
      justify-content: center;
      gap: 8px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .dir-btn {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 16px;
      background: #eef5e7;
      color: #36551a;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    .dir-btn:active {
      transform: scale(0.96);
    }
    .dir-spacer {
      width: 64px;
      height: 64px;
    }
    .help {
      margin-top: 12px;
      color: #4d4d4d;
      font-size: 14px;
      line-height: 1.6;
    }
    .flash {
      animation: hitflash 0.2s linear 2;
    }
    @keyframes hitflash {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.01); filter: brightness(1.15); }
      100% { transform: scale(1); filter: brightness(1); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>지렁이 게임</h1>
      <div class="info">
        <div class="pill">점수: <span id="score">0</span></div>
        <div class="pill">최고 점수: <span id="best">0</span></div>
        <div class="pill">목숨: <span class="lives" id="lives"></span></div>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="game" width="480" height="480"></canvas>
      <div class="overlay" id="overlay">
        <div class="message" id="messageBox">
          <strong>시작 준비!</strong>
          방향키, 버튼, 또는 스와이프로 시작하세요.
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn">새 게임</button>
      <button id="pauseBtn" class="secondary">일시정지</button>
    </div>

    <div class="mobile-controls" aria-label="모바일 방향키">
      <div class="dir-spacer"></div>
      <button class="dir-btn" data-dir="up" aria-label="위로">▲</button>
      <div class="dir-spacer"></div>
      <button class="dir-btn" data-dir="left" aria-label="왼쪽">◀</button>
      <button class="dir-btn" data-dir="down" aria-label="아래로">▼</button>
      <button class="dir-btn" data-dir="right" aria-label="오른쪽">▶</button>
    </div>

    <div class="help">
      조작: 키보드 방향키 / 모바일 버튼 / 스와이프<br />
      먹이 5개마다 장애물 5개가 추가됩니다.<br />
      충돌하면 목숨이 1개 줄고, 길이는 20% 감소하며 랜덤 위치에서 다시 시작합니다.<br />
      충돌 후 1초 무적이며, 장애물은 일부 제거됩니다. 목숨 3개를 모두 잃으면 처음부터 다시 시작합니다.
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const livesEl = document.getElementById('lives');
    const overlay = document.getElementById('overlay');
    const messageBox = document.getElementById('messageBox');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const dirButtons = document.querySelectorAll('.dir-btn');

    const gridSize = 24;
    const tileCount = canvas.width / gridSize;
    const maxLives = 3;
    const invincibleDuration = 3000;
    const baseSpeed = 240;

    let worm = [];
    let food = { x: 0, y: 0 };
    let obstacles = [];
    let dx = 1;
    let dy = 0;
    let score = 0;
    let foodsEaten = 0;
    let lives = maxLives;
    let bestScore = Number(localStorage.getItem('worm-best-score') || 0);
    let running = false;
    let started = false;
    let paused = false;
    let loopId = null;
    let invincibleUntil = 0;
    let waitingForInput = false;
    let hitEffect = null;

    bestEl.textContent = String(bestScore);

    function renderLives() {
      livesEl.innerHTML = Array.from({ length: maxLives }, (_, i) => {
        return `<span class="heart ${i < lives ? '' : 'off'}">❤</span>`;
      }).join('');
    }

    function showMessage(title, text) {
      messageBox.innerHTML = `<strong>${title}</strong>${text}`;
      overlay.style.display = 'flex';
    }

    function hideMessage() {
      overlay.style.display = 'none';
    }

    function isCellBlocked(x, y) {
      return worm.some(part => part.x === x && part.y === y) ||
             obstacles.some(part => part.x === x && part.y === y);
    }

    function randomFood() {
      let pos;
      let guard = 0;
      do {
        pos = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
        guard += 1;
      } while (isCellBlocked(pos.x, pos.y) && guard < 1000);
      return pos;
    }

    function addRandomObstacles(count = 5) {
      let added = 0;
      let guard = 0;
      while (added < count && guard < 2000) {
        guard += 1;
        const pos = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
        const sameAsFood = food.x === pos.x && food.y === pos.y;
        if (!isCellBlocked(pos.x, pos.y) && !sameAsFood) {
          obstacles.push(pos);
          added += 1;
        }
      }
    }

    function resetRound(length = 3, randomSpawn = false) {
      const targetLength = Math.max(3, length);
      const directions = [
        { dx: 1, dy: 0 },
        { dx: -1, dy: 0 },
        { dx: 0, dy: 1 },
        { dx: 0, dy: -1 }
      ];

      if (!randomSpawn) {
        worm = [];
        for (let i = 0; i < targetLength; i += 1) {
          worm.push({ x: 10 - i, y: 10 });
        }
        dx = 1;
        dy = 0;
        food = randomFood();
        return;
      }

      let placed = false;
      let guard = 0;
      while (!placed && guard < 2000) {
        guard += 1;
        const dir = directions[Math.floor(Math.random() * directions.length)];
        const startX = Math.floor(Math.random() * tileCount);
        const startY = Math.floor(Math.random() * tileCount);
        const candidate = [];
        let valid = true;

        for (let i = 0; i < targetLength; i += 1) {
          const x = startX - dir.dx * i;
          const y = startY - dir.dy * i;
          if (
            x < 0 || x >= tileCount ||
            y < 0 || y >= tileCount ||
            obstacles.some(o => o.x === x && o.y === y)
          ) {
            valid = false;
            break;
          }
          candidate.push({ x, y });
        }

        if (valid) {
          worm = candidate;
          dx = dir.dx;
          dy = dir.dy;
          placed = true;
        }
      }

      if (!placed) {
        worm = [];
        for (let i = 0; i < 3; i += 1) {
          worm.push({ x: 10 - i, y: 10 });
        }
        dx = 1;
        dy = 0;
      }

      food = randomFood();
    }

    function resetState() {
      score = 0;
      foodsEaten = 0;
      lives = maxLives;
      obstacles = [];
      invincibleUntil = 0;
      hitEffect = null;
      scoreEl.textContent = String(score);
      renderLives();
    }

    function resetGame() {
      if (loopId) {
        clearTimeout(loopId);
        loopId = null;
      }
      resetState();
      resetRound(3, false);
      running = false;
      started = false;
      paused = false;
      waitingForInput = true;
      pauseBtn.textContent = '일시정지';
      showMessage('시작 준비!', '방향키, 버튼, 또는 스와이프로 시작하세요.');
      draw();
    }

    function triggerHitEffect(x, y) {
      hitEffect = { x, y, start: performance.now() };
      canvas.classList.remove('flash');
      void canvas.offsetWidth;
      canvas.classList.add('flash');
      setTimeout(() => canvas.classList.remove('flash'), 400);
    }

    function loseLife(head) {
      triggerHitEffect(head.x, head.y);
      lives -= 1;
      renderLives();

      if (lives <= 0) {
        running = false;
        started = false;
        waitingForInput = true;
        showMessage('게임 오버', `최종 점수: ${score}<br>방향키, 버튼, 또는 새 게임으로 다시 시작하세요.`);
        resetState();
        resetRound(3, false);
        draw();
        return;
      }

      const reducedLength = Math.max(3, Math.ceil(worm.length * 0.8));
      invincibleUntil = performance.now() + invincibleDuration;

      if (obstacles.length > 0) {
        const removeCount = Math.max(1, Math.floor(obstacles.length * 0.5));
        for (let i = obstacles.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [obstacles[i], obstacles[j]] = [obstacles[j], obstacles[i]];
        }
        obstacles.splice(0, removeCount);
      }

      resetRound(reducedLength, true);
      running = false;
      waitingForInput = true;
      showMessage('앗!', `목숨이 1개 줄었습니다.<br>남은 목숨: ${lives}<br>버튼을 눌러 다시 시작하세요.`);
      draw();
    }
    }

    function startGameIfNeeded() {
      if (waitingForInput) {
        waitingForInput = false;
        running = true;
        started = true;
        paused = false;
        hideMessage();
        gameLoop();
        return;
      }

      if (!started) {
        started = true;
        running = true;
        paused = false;
        hideMessage();
        gameLoop();
      }
    }
    }

    function setDirection(direction) {
      if (!running && !started) {
        if (direction === 'up') { dx = 0; dy = -1; }
        if (direction === 'down') { dx = 0; dy = 1; }
        if (direction === 'left') { dx = -1; dy = 0; }
        if (direction === 'right') { dx = 1; dy = 0; }
        startGameIfNeeded();
        return;
      }

      if (!running || paused) return;

      if (direction === 'up' && dy !== 1) {
        dx = 0; dy = -1;
      } else if (direction === 'down' && dy !== -1) {
        dx = 0; dy = 1;
      } else if (direction === 'left' && dx !== 1) {
        dx = -1; dy = 0;
      } else if (direction === 'right' && dx !== -1) {
        dx = 1; dy = 0;
      }
    }

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    function drawTile(x, y, color, radius) {
      const px = x * gridSize;
      const py = y * gridSize;
      ctx.fillStyle = color;
      roundRect(ctx, px + 2, py + 2, gridSize - 4, gridSize - 4, radius);
      ctx.fill();
    }

    function drawHitEffect() {
      if (!hitEffect) return;
      const elapsed = performance.now() - hitEffect.start;
      if (elapsed > 500) {
        hitEffect = null;
        return;
      }
      const alpha = 1 - elapsed / 500;
      const radius = 10 + elapsed / 12;
      const cx = hitEffect.x * gridSize + gridSize / 2;
      const cy = hitEffect.y * gridSize + gridSize / 2;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#ff5a5a';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const invincible = performance.now() < invincibleUntil;

      for (let y = 0; y < tileCount; y += 1) {
        for (let x = 0; x < tileCount; x += 1) {
          ctx.fillStyle = (x + y) % 2 === 0 ? '#dcecc8' : '#d4e5c0';
          ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
        }
      }

      drawTile(food.x, food.y, '#d94b4b', 10);

      obstacles.forEach((part) => {
        drawTile(part.x, part.y, '#6f7682', 5);
      });

      worm.forEach((part, index) => {
        let color = index === 0 ? '#6a9f30' : '#7fb53d';
        if (invincible) {
          color = index === 0 ? '#8bb7ff' : '#b7d0ff';
        }
        drawTile(part.x, part.y, color, 8);
      });

      if (worm.length > 0) {
        const eyeX = worm[0].x * gridSize;
        const eyeY = worm[0].y * gridSize;
        ctx.fillStyle = '#1f2a10';
        ctx.beginPath();
        ctx.arc(eyeX + 8, eyeY + 9, 2, 0, Math.PI * 2);
        ctx.arc(eyeX + 16, eyeY + 9, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      if (invincible) {
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#78a8ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      drawHitEffect();
    }

    function update() {
      const head = { x: worm[0].x + dx, y: worm[0].y + dy };
      const now = performance.now();
      const invincible = now < invincibleUntil;

      const collided = (
        head.x < 0 || head.x >= tileCount ||
        head.y < 0 || head.y >= tileCount ||
        worm.some(part => part.x === head.x && part.y === head.y) ||
        obstacles.some(part => part.x === head.x && part.y === head.y)
      );

      if (collided) {
        if (!invincible) {
          loseLife(head);
        }
        return;
      }

      worm.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        foodsEaten += 1;
        scoreEl.textContent = String(score);
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('worm-best-score', String(bestScore));
          bestEl.textContent = String(bestScore);
        }
        if (foodsEaten % 5 === 0) {
          addRandomObstacles(5);
        }
        food = randomFood();
      } else {
        worm.pop();
      }
    }

    function gameLoop() {
      if (!running || paused) return;
      update();
      draw();
      loopId = setTimeout(gameLoop, baseSpeed);
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key;
      const isArrow = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key);
      if (isArrow) e.preventDefault();

      if (key === 'ArrowUp') setDirection('up');
      else if (key === 'ArrowDown') setDirection('down');
      else if (key === 'ArrowLeft') setDirection('left');
      else if (key === 'ArrowRight') setDirection('right');
    });

    dirButtons.forEach((button) => {
      const dir = button.dataset.dir;
      const handler = (e) => {
        e.preventDefault();
        setDirection(dir);
      };
      button.addEventListener('click', handler);
      button.addEventListener('touchstart', handler, { passive: false });
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      const touch = e.changedTouches[0];
      const dxSwipe = touch.clientX - touchStartX;
      const dySwipe = touch.clientY - touchStartY;
      const absX = Math.abs(dxSwipe);
      const absY = Math.abs(dySwipe);

      if (Math.max(absX, absY) < 20) return;

      if (absX > absY) {
        setDirection(dxSwipe > 0 ? 'right' : 'left');
      } else {
        setDirection(dySwipe > 0 ? 'down' : 'up');
      }
    }, { passive: true });

    startBtn.addEventListener('click', resetGame);

    pauseBtn.addEventListener('click', () => {
      if (!started) return;
      paused = !paused;
      pauseBtn.textContent = paused ? '계속하기' : '일시정지';
      if (paused) {
        showMessage('일시정지', '계속하기 버튼을 누르면 다시 시작됩니다.');
      } else {
        hideMessage();
        gameLoop();
      }
    });

    renderLives();
    resetGame();
  </script>
</body>
</html>
