<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지렁이 게임 React 버전 · AI-home C-LAB</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: #f7fee7; }
    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 50;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: sans-serif;
      font-size: 13px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      color: #334155;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .back-btn:hover { background: #fff; border-color: #94a3b8; }
  </style>
</head>
<body>

<a class="back-btn" href="index.html">← 홈으로</a>

<div id="root"></div>

<script type="text/babel" data-presets="react,typescript">
const { useCallback, useEffect, useMemo, useRef, useState } = React;

const BOARD_SIZE = 20;
const CELL_SIZE = 20;
const BASE_SPEED = 240;
const MAX_LIVES = 3;
const INVINCIBLE_MS = 3000;
const MIN_SWIPE = 24;

const DIR_MAP = {
  up: { dx: 0, dy: -1 },
  down: { dx: 0, dy: 1 },
  left: { dx: -1, dy: 0 },
  right: { dx: 1, dy: 0 },
};

function sameCell(a, b) { return a.x === b.x && a.y === b.y; }
function randomInt(max) { return Math.floor(Math.random() * max); }
function buildDefaultWorm(length = 3) {
  return Array.from({ length }, (_, i) => ({ x: 10 - i, y: 10 }));
}
function isReverse(next, current) {
  return (next === "up" && current === "down") ||
    (next === "down" && current === "up") ||
    (next === "left" && current === "right") ||
    (next === "right" && current === "left");
}
function hearts(lives) {
  return Array.from({ length: MAX_LIVES }, (_, i) => i < lives);
}

function WormGameReact() {
  const [worm, setWorm] = useState(() => buildDefaultWorm(3));
  const [direction, setDirection] = useState("right");
  const [food, setFood] = useState({ x: 14, y: 10 });
  const [obstacles, setObstacles] = useState([]);
  const [score, setScore] = useState(0);
  const [bestScore, setBestScore] = useState(() => {
    try { return Number(localStorage.getItem("worm-best-score-react") || 0); } catch { return 0; }
  });
  const [lives, setLives] = useState(MAX_LIVES);
  const [foodsEaten, setFoodsEaten] = useState(0);
  const [running, setRunning] = useState(false);
  const [paused, setPaused] = useState(false);
  const [waitingForInput, setWaitingForInput] = useState(true);
  const [message, setMessage] = useState("방향키, 버튼, 또는 스와이프로 시작하세요.");
  const [invincibleUntil, setInvincibleUntil] = useState(0);
  const [hitFlash, setHitFlash] = useState(false);
  const [hitCell, setHitCell] = useState(null);

  const touchStartRef = useRef(null);
  const timerRef = useRef(null);
  const directionRef = useRef("right");
  const runningRef = useRef(false);
  const pausedRef = useRef(false);
  const waitingRef = useRef(true);
  const wormRef = useRef(buildDefaultWorm(3));
  const obstaclesRef = useRef([]);
  const foodRef = useRef({ x: 14, y: 10 });
  const livesRef = useRef(MAX_LIVES);
  const foodsEatenRef = useRef(0);
  const invincibleRef = useRef(0);
  const scoreRef = useRef(0);

  const boardPx = BOARD_SIZE * CELL_SIZE;
  const isInvincible = Date.now() < invincibleUntil;

  const syncRefs = useCallback(() => {
    directionRef.current = direction;
    runningRef.current = running;
    pausedRef.current = paused;
    waitingRef.current = waitingForInput;
    wormRef.current = worm;
    obstaclesRef.current = obstacles;
    foodRef.current = food;
    livesRef.current = lives;
    foodsEatenRef.current = foodsEaten;
    invincibleRef.current = invincibleUntil;
    scoreRef.current = score;
  }, [direction, running, paused, waitingForInput, worm, obstacles, food, lives, foodsEaten, invincibleUntil, score]);

  useEffect(() => { syncRefs(); }, [syncRefs]);

  const isBlocked = useCallback((cell, wormCells, obstacleCells) => {
    return wormCells.some(p => sameCell(p, cell)) || obstacleCells.some(p => sameCell(p, cell));
  }, []);

  const randomFoodCell = useCallback((wormCells, obstacleCells) => {
    for (let g = 0; g < 2000; g++) {
      const cell = { x: randomInt(BOARD_SIZE), y: randomInt(BOARD_SIZE) };
      if (!isBlocked(cell, wormCells, obstacleCells)) return cell;
    }
    return { x: 0, y: 0 };
  }, [isBlocked]);

  const addObstacleCells = useCallback((wormCells, obstacleCells, foodCell, count = 5) => {
    const next = [...obstacleCells];
    let added = 0;
    for (let g = 0; g < 3000 && added < count; g++) {
      const cell = { x: randomInt(BOARD_SIZE), y: randomInt(BOARD_SIZE) };
      const blocked = wormCells.some(p => sameCell(p, cell)) || next.some(p => sameCell(p, cell)) || sameCell(foodCell, cell);
      if (!blocked) { next.push(cell); added++; }
    }
    return next;
  }, []);

  const randomRespawn = useCallback((length, obstacleCells) => {
    const dirs = ["right", "left", "down", "up"];
    for (let g = 0; g < 3000; g++) {
      const dir = dirs[randomInt(dirs.length)];
      const vec = DIR_MAP[dir];
      const start = { x: randomInt(BOARD_SIZE), y: randomInt(BOARD_SIZE) };
      const nextWorm = [];
      let valid = true;
      for (let i = 0; i < length; i++) {
        const cell = { x: start.x - vec.dx * i, y: start.y - vec.dy * i };
        if (cell.x < 0 || cell.x >= BOARD_SIZE || cell.y < 0 || cell.y >= BOARD_SIZE || obstacleCells.some(o => sameCell(o, cell))) { valid = false; break; }
        nextWorm.push(cell);
      }
      if (valid) return { worm: nextWorm, direction: dir };
    }
    return { worm: buildDefaultWorm(3), direction: "right" };
  }, []);

  const resetAll = useCallback(() => {
    const nextWorm = buildDefaultWorm(3);
    const nextObstacles = [];
    const nextFood = randomFoodCell(nextWorm, nextObstacles);
    setWorm(nextWorm); setDirection("right"); setFood(nextFood); setObstacles(nextObstacles);
    setScore(0); setLives(MAX_LIVES); setFoodsEaten(0); setRunning(false);
    setPaused(false); setWaitingForInput(true); setInvincibleUntil(0);
    setHitCell(null); setMessage("방향키, 버튼, 또는 스와이프로 시작하세요.");
  }, [randomFoodCell]);

  useEffect(() => { resetAll(); }, [resetAll]);

  useEffect(() => {
    try { localStorage.setItem("worm-best-score-react", String(bestScore)); } catch {}
  }, [bestScore]);

  const startOrResume = useCallback(() => {
    setRunning(true); setPaused(false); setWaitingForInput(false);
  }, []);

  const handleDirection = useCallback((next) => {
    const current = directionRef.current;
    if (waitingRef.current) { setDirection(next); directionRef.current = next; startOrResume(); return; }
    if (!runningRef.current || pausedRef.current) return;
    if (isReverse(next, current)) return;
    setDirection(next); directionRef.current = next;
  }, [startOrResume]);

  const applyHit = useCallback((collisionCell) => {
    setHitCell(collisionCell);
    setHitFlash(true);
    setTimeout(() => setHitFlash(false), 350);
    const remainingLives = livesRef.current - 1;
    if (remainingLives <= 0) {
      const finalScore = scoreRef.current;
      resetAll();
      setMessage(`게임 오버. 최종 점수 ${finalScore}. 방향키, 버튼, 또는 스와이프로 다시 시작하세요.`);
      return;
    }
    let nextObstacles = [...obstaclesRef.current];
    if (nextObstacles.length > 0) {
      const removeCount = Math.max(1, Math.floor(nextObstacles.length * 0.5));
      nextObstacles = nextObstacles.slice(removeCount);
    }
    const currentLen = wormRef.current.length;
    const nextLen = Math.max(3, Math.floor(currentLen * 0.8));
    const respawn = randomRespawn(nextLen, nextObstacles);
    const nextFood = randomFoodCell(respawn.worm, nextObstacles);
    const invUntil = Date.now() + INVINCIBLE_MS;
    setLives(remainingLives); livesRef.current = remainingLives;
    setObstacles(nextObstacles); obstaclesRef.current = nextObstacles;
    setWorm(respawn.worm); wormRef.current = respawn.worm;
    setDirection(respawn.direction); directionRef.current = respawn.direction;
    setFood(nextFood); foodRef.current = nextFood;
    setInvincibleUntil(invUntil); invincibleRef.current = invUntil;
    setRunning(false); setWaitingForInput(true);
    setMessage(`목숨이 1개 줄었습니다. 남은 목숨: ${remainingLives}. 입력 후 다시 시작합니다. 무적 3초 적용.`);
  }, [randomFoodCell, randomRespawn, resetAll]);

  const tick = useCallback(() => {
    if (!runningRef.current || pausedRef.current || waitingRef.current) return;
    const currentWorm = wormRef.current;
    const vec = DIR_MAP[directionRef.current];
    const head = { x: currentWorm[0].x + vec.dx, y: currentWorm[0].y + vec.dy };
    const invincible = Date.now() < invincibleRef.current;
    const collided = head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE ||
      currentWorm.some(p => sameCell(p, head)) || obstaclesRef.current.some(p => sameCell(p, head));
    if (collided) { if (!invincible) applyHit(head); return; }

    const nextWorm = [head, ...currentWorm];
    if (sameCell(head, foodRef.current)) {
      const nextScore = scoreRef.current + 10;
      const nextFoodsEaten = foodsEatenRef.current + 1;
      if (nextScore > bestScore) setBestScore(nextScore);
      let nextObstacles = obstaclesRef.current;
      if (nextFoodsEaten % 5 === 0) nextObstacles = addObstacleCells(nextWorm, obstaclesRef.current, foodRef.current, 5);
      const nextFood = randomFoodCell(nextWorm, nextObstacles);
      setScore(nextScore); setFoodsEaten(nextFoodsEaten); setObstacles(nextObstacles); setFood(nextFood); setWorm(nextWorm);
    } else {
      nextWorm.pop(); setWorm(nextWorm);
    }
  }, [addObstacleCells, applyHit, bestScore, randomFoodCell]);

  useEffect(() => {
    if (!running || paused || waitingForInput) {
      if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; }
      return;
    }
    timerRef.current = setTimeout(() => { tick(); }, BASE_SPEED);
    return () => { if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; } };
  }, [worm, running, paused, waitingForInput, tick]);

  useEffect(() => {
    const onKeyDown = (e) => {
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
      if (e.key === "ArrowUp") handleDirection("up");
      if (e.key === "ArrowDown") handleDirection("down");
      if (e.key === "ArrowLeft") handleDirection("left");
      if (e.key === "ArrowRight") handleDirection("right");
    };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, [handleDirection]);

  const boardCells = useMemo(() => {
    const items = [];
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        const cell = { x, y };
        let className = (x + y) % 2 === 0 ? "bg-lime-100" : "bg-lime-200";
        if (sameCell(food, cell)) className = "bg-red-500 rounded-md";
        if (obstacles.some(o => sameCell(o, cell))) className = "bg-slate-500 rounded-md";
        const wormIndex = worm.findIndex(p => sameCell(p, cell));
        if (wormIndex >= 0) {
          className = wormIndex === 0
            ? (isInvincible ? "bg-sky-400 rounded-md" : "bg-green-700 rounded-md")
            : (isInvincible ? "bg-sky-200 rounded-md" : "bg-green-500 rounded-md");
        }
        if (hitCell && sameCell(hitCell, cell)) className += " ring-4 ring-red-300";
        items.push(<div key={`${x}-${y}`} className={`${className} border border-white/20`} style={{ width: CELL_SIZE, height: CELL_SIZE }} />);
      }
    }
    return items;
  }, [food, obstacles, worm, hitCell, isInvincible]);

  return (
    <div className="min-h-screen bg-lime-50 flex items-center justify-center p-4 pt-16">
      <div className="w-full max-w-xl rounded-3xl bg-white shadow-2xl p-5 md:p-6">
        <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
          <h1 className="text-2xl font-bold text-slate-800">지렁이 게임 React 버전</h1>
          <div className="flex flex-wrap gap-2 text-sm">
            <div className="rounded-full bg-lime-100 px-3 py-2">점수: <span className="font-semibold">{score}</span></div>
            <div className="rounded-full bg-lime-100 px-3 py-2">최고: <span className="font-semibold">{bestScore}</span></div>
            <div className="rounded-full bg-lime-100 px-3 py-2 flex items-center gap-1">
              목숨: {hearts(lives).map((on, i) => (<span key={i} className={`text-base ${on ? "opacity-100" : "opacity-25"}`}>❤</span>))}
            </div>
          </div>
        </div>
        <div className="relative">
          <div
            className={`relative overflow-hidden rounded-2xl border-2 border-lime-300 bg-lime-100 ${hitFlash ? "animate-pulse" : ""}`}
            style={{ width: boardPx, maxWidth: "100%", aspectRatio: "1 / 1" }}
            onTouchStart={(e) => { const t = e.touches[0]; touchStartRef.current = { x: t.clientX, y: t.clientY }; }}
            onTouchEnd={(e) => {
              if (!touchStartRef.current) return;
              const t = e.changedTouches[0];
              const dx = t.clientX - touchStartRef.current.x;
              const dy = t.clientY - touchStartRef.current.y;
              touchStartRef.current = null;
              if (Math.max(Math.abs(dx), Math.abs(dy)) < MIN_SWIPE) return;
              if (Math.abs(dx) > Math.abs(dy)) handleDirection(dx > 0 ? "right" : "left");
              else handleDirection(dy > 0 ? "down" : "up");
            }}
          >
            <div className="grid" style={{ gridTemplateColumns: `repeat(${BOARD_SIZE}, minmax(0, 1fr))`, width: "100%", height: "100%" }}>
              {boardCells}
            </div>
            {isInvincible && <div className="pointer-events-none absolute inset-0 bg-sky-200/20" />}
            {(waitingForInput || paused) && (
              <div className="absolute inset-0 flex items-center justify-center bg-white/55 p-4 text-center">
                <div className="rounded-2xl bg-white/95 shadow-lg px-5 py-4 text-slate-700 leading-6">
                  <div className="text-xl font-bold mb-2">{paused ? "일시정지" : "준비"}</div>
                  <div>{paused ? "계속하려면 일시정지를 다시 누르세요." : message}</div>
                </div>
              </div>
            )}
          </div>
        </div>
        <div className="mt-4 flex flex-wrap gap-2">
          <button onClick={resetAll} className="rounded-xl bg-green-700 hover:bg-green-800 text-white px-4 py-2 font-medium">새 게임</button>
          <button
            onClick={() => { if (waitingForInput) return; setPaused(prev => !prev); }}
            className="rounded-xl bg-slate-500 hover:bg-slate-600 text-white px-4 py-2 font-medium"
          >{paused ? "계속하기" : "일시정지"}</button>
        </div>
        <div className="mt-5 grid grid-cols-3 gap-2 w-fit mx-auto select-none">
          <div />
          <button onClick={() => handleDirection("up")} className="h-16 w-16 rounded-2xl bg-lime-100 text-2xl font-bold text-green-800 shadow">▲</button>
          <div />
          <button onClick={() => handleDirection("left")} className="h-16 w-16 rounded-2xl bg-lime-100 text-2xl font-bold text-green-800 shadow">◀</button>
          <button onClick={() => handleDirection("down")} className="h-16 w-16 rounded-2xl bg-lime-100 text-2xl font-bold text-green-800 shadow">▼</button>
          <button onClick={() => handleDirection("right")} className="h-16 w-16 rounded-2xl bg-lime-100 text-2xl font-bold text-green-800 shadow">▶</button>
        </div>
        <div className="mt-5 text-sm leading-6 text-slate-600">
          <div>조작: 키보드 방향키 / 화면 버튼 / 스와이프</div>
          <div>먹이 5개마다 장애물 5개 추가</div>
          <div>충돌 시 목숨 1 감소, 길이 20% 감소, 랜덤 위치 재시작, 장애물 일부 제거</div>
          <div>충돌 후 입력 1번 후 재시작, 무적 시간 3초</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<WormGameReact />);
</script>
</body>
</html>
